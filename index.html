<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audeo</title>
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest.json?v=3">
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <link rel="apple-touch-icon" href="/icon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./index.css">
</head>
  <body>
    <div class="app-container">
      <div class="main-content">
        <div class="note-area">
          <div class="note-header">
            <div class="editor-title" id="editorTitle" contenteditable="true" placeholder="Untitled Note">
              Untitled Note
            </div>
            
            <div class="header-actions-container">
              <div class="tab-navigation-container">
                <div class="tab-navigation">
                  <button class="tab-button active" data-tab="note">Polished</button>
                  <button class="tab-button" data-tab="raw">Raw</button>
                  <div class="active-tab-indicator"></div>
                </div>
              </div>
              
              <div class="utility-actions">
                <button class="header-action-btn hidden" id="installButton" title="Install Audeo App">
                  <i class="fas fa-mobile-screen-button"></i><span class="btn-text">Install App</span>
                </button>
                <div class="export-dropdown">
                  <button class="header-action-btn" id="exportButton" title="Export Note">
                    <i class="fas fa-download"></i>
                  </button>
                  <div class="export-menu">
                    <button id="exportTxt">Text (.txt)</button>
                    <button id="exportPdf">PDF (.pdf)</button>
                  </div>
                </div>
                <button class="header-action-btn" id="copyButton" title="Copy Note (Duplicate)">
                  <i class="fas fa-copy"></i>
                </button>
                <button class="header-action-btn" id="undoButton" title="Undo (Ctrl+Z)">
                  <i class="fas fa-undo"></i>
                </button>
                <button class="header-action-btn" id="redoButton" title="Redo (Ctrl+Y)">
                  <i class="fas fa-redo"></i>
                </button>
                <button class="header-action-btn hidden" id="saveSharedToLocalButton" title="Save to My Notes">
                  <i class="fas fa-save"></i>
                </button>
                <button class="header-action-btn" id="shareButton" title="Share Note">
                  <i class="fas fa-share-alt"></i>
                </button>
                <button class="header-action-btn" id="historyToggleButton" title="History">
                  <i class="fas fa-history"></i>
                </button>
              </div>
            </div>
          </div>

          <div class="tag-input-wrapper-main">
            <div class="tag-chips-input-container">
              <div id="currentTags" class="tag-chips"></div>
              <input type="text" id="tagInput" placeholder="Add tags..." class="tag-input">
            </div>
          </div>

          <div class="note-content-wrapper">
            <div
              id="polishedNote"
              class="note-content active"
              contenteditable="true"
              placeholder="Your polished notes will appear here..."
            ></div>
            <div
              id="rawTranscription"
              class="note-content"
              contenteditable="true"
              placeholder="Raw transcription will appear here..."
            ></div>
          </div>
        </div>

        <div class="recording-interface">
          <div id="liveRecordingTitle" class="live-recording-title" style="display: none">
            Recording
          </div>
          <canvas id="liveWaveformCanvas" style="display: none"></canvas>
          <div id="liveRecordingTimerDisplay" class="live-recording-timer" style="display: none">
            00:00.00
          </div>

          <div class="status-indicator">
            <span id="recordingStatus" class="status-text">Ready to record</span>
          </div>

          <div class="recording-controls">
            <button class="action-button" id="themeToggleButton" title="Toggle Theme">
              <i class="fas fa-sun"></i>
              <span class="action-btn-text">Theme</span>
            </button>

            <button class="action-button" id="uploadButton" title="Upload Audio">
              <i class="fas fa-upload"></i>
              <span class="action-btn-text">Upload</span>
            </button>
            <input type="file" id="audioUploadInput" accept="audio/*" style="display: none;">

            <button class="action-button hidden" id="playPlaybackButton" title="Listen to Original Recording">
              <i class="fas fa-play"></i>
              <span class="action-btn-text">Listen</span>
            </button>

            <button id="recordButton" class="record-button" title="Start/Stop Recording">
              <div class="record-button-inner">
                <i class="fas fa-microphone"></i>
              </div>
              <svg class="record-waves" viewBox="0 0 200 200">
                <circle class="wave wave1" cx="100" cy="100" r="40" />
                <circle class="wave wave2" cx="100" cy="100" r="70" />
                <circle class="wave wave3" cx="100" cy="100" r="100" />
              </svg>
              <span class="record-text">Record</span>
            </button>

            <button class="action-button" id="newButton" title="New Note">
              <i class="fas fa-plus"></i>
              <span class="action-btn-text">New</span>
            </button>
          </div>
        </div>
      </div>

      <!-- History Sidebar -->
      <div id="historySidebar" class="history-sidebar">
        <div class="sidebar-header">
          <h3>History</h3>
          <div class="sidebar-header-actions">
            <button id="clearHistoryButton" class="clear-history-btn" title="Clear all history">
              <i class="fas fa-trash-sweep"></i>
            </button>
            <button id="closeHistoryButton" class="close-sidebar-btn">
              <i class="fas fa-times"></i>
            </button>
          </div>
        </div>
        <div class="sidebar-search-area">
          <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="historySearch" placeholder="Search titles or content...">
          </div>
          <div id="filterTags" class="filter-tags-list"></div>
        </div>
        <div id="historyList" class="history-list">
          <div class="history-empty-message">No saved notes yet</div>
        </div>
      </div>
      <div id="sidebarOverlay" class="sidebar-overlay"></div>
    </div>

    <div id="draftToast" class="share-toast draft-toast">
      <div class="share-toast-content">
        <i class="fas fa-file-alt"></i>
        <span>Restored unsaved changes from last session</span>
        <button id="dismissDraft" class="toast-action-btn">Dismiss</button>
      </div>
    </div>

    <div id="micStatus" class="debug-panel"></div>

    <div id="shareToast" class="share-toast">
      <div class="share-toast-content">
        <i class="fas fa-link"></i>
        <span id="shareToastMessage">Link copied to clipboard!</span>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const tabNav = document.querySelector(".tab-navigation");
        if (!tabNav) return;
        const tabButtons = tabNav.querySelectorAll(".tab-button");
        const activeTabIndicator = tabNav.querySelector(".active-tab-indicator");
        const noteContents = document.querySelectorAll(".note-content");

        function setActiveTab(activeButton, skipAnimation = false) {
          if (!activeButton || !activeTabIndicator) return;

          tabButtons.forEach((btn) => btn.classList.remove("active"));
          activeButton.classList.add("active");

          const tabName = activeButton.getAttribute("data-tab");
          noteContents.forEach((content) => content.classList.remove("active"));

          if (tabName === "raw") {
            document.getElementById("rawTranscription").classList.add("active");
          } else {
            document.getElementById("polishedNote").classList.add("active");
          }

          const originalTransition = activeTabIndicator.style.transition;
          if (skipAnimation) {
            activeTabIndicator.style.transition = "none";
          } else {
            activeTabIndicator.style.transition = "";
          }

          activeTabIndicator.style.left = `${activeButton.offsetLeft}px`;
          activeTabIndicator.style.width = `${activeButton.offsetWidth}px`;

          if (skipAnimation) {
            activeTabIndicator.offsetHeight;
            activeTabIndicator.style.transition = originalTransition;
          }
        }

        tabButtons.forEach((button) => {
          button.addEventListener("click", (e) => {
            setActiveTab(e.currentTarget);
          });
        });

        const initiallyActiveButton = tabNav.querySelector(".tab-button.active");
        if (initiallyActiveButton) {
          requestAnimationFrame(() => {
            setActiveTab(initiallyActiveButton, true);
          });
        }

        window.addEventListener("resize", () => {
          requestAnimationFrame(() => {
            const currentActiveButton = tabNav.querySelector(".tab-button.active");
            if (currentActiveButton) {
              setActiveTab(currentActiveButton, true);
            }
          });
        });
      });
    </script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
